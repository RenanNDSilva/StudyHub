<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feed - StudyHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/feed.css">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
</head>

<body>
    <nav class="navbar navbar-dark shadow-sm px-3">
        <div class="container-fluid">
            <img src="assets/img/logoStudyHub.png" alt="StudyHub" class="navbar-brand logo-studyhub">
            <img src="assets/img/perfil.jpg" alt="Perfil" class="rounded-circle" width="40" height="40">
        </div>
    </nav>

    <main class="container mt-4">

        <!-- Barra de Pesquisa -->
        <div class="input-group mb-4">
            <span class="input-group-text bg-dark text-light border-secondary">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control bg-dark text-light border-secondary"
                placeholder="Pesquisar postagens..." id="barraPesquisa">
        </div>

        <!-- Campo de Postagem -->
        <div class="card mb-4 text-light position-relative">
            <div class="card-body p-3">
                <form id="novaPostagem" class="position-relative">
                    <div class="position-relative">
                        <!-- Textarea com padding para não sobrepor botões -->
                        <textarea class="form-control bg-dark text-light border-secondary pe-5 pb-5" rows="3"
                            placeholder="O que você está estudando hoje?" required></textarea>

                        <!-- Botões agrupados na direita -->
                        <div class="position-absolute bottom-0 end-0 m-2 d-flex align-items-center gap-2">
                            <!-- Ícone de anexo -->
                            <label for="uploadArquivo" class="text-primary mb-0" style="cursor: pointer;">
                                <i class="bi bi-paperclip fs-5"></i>
                            </label>
                            <input type="file" id="uploadArquivo" class="d-none">

                            <!-- Botão Publicar -->
                            <button type="submit" class="btn btn-primary btn-sm">Publicar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Postagem no Feed -->
        <div class="card mb-3 bg-dark text-light border-0">
            <div class="card-body pb-1">
                <div class="d-flex align-items-center mb-2">
                    <img src="assets/img/perfil.jpg" alt="Perfil" class="rounded-circle me-2" width="40" height="40">
                    <div class="post-usuario">
                        Renan Nascimento <small class="text-">· 14:30</small>
                    </div>
                </div>
                <p class="mb-2">Alguém tem resumos de lógica de programação? 📚💡</p>
                <img src="assets/img/prova.jpeg" alt="imagem postada" class="postagem-img" data-bs-toggle="modal"
                    data-bs-target="#modalImagem">

                <div class="mt-3 d-flex justify-content-around post-actions">
                    <span><i class="bi bi-chat"></i> 12</span>
                    <span><i class="bi bi-heart"></i> 48</span>
                    <span><i class="bi bi-share"></i></span>
                </div>
            </div>
        </div>

        <!-- Modal para exibir imagem em tamanho maior -->
        <div class="modal fade" id="modalImagem" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content bg-dark border-0">
                    <div class="modal-body p-0">
                        <img src="assets/img/prova.jpeg" class="img-fluid w-100 rounded">
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
